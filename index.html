<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER QUIZ v1.0 - TESTE SEU CONHECIMENTO 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            text-align: center;
            overflow-x: hidden;
            animation: bgGlitch 8s infinite;
        }

        @keyframes bgGlitch {
            0%, 100% { background: #000; }
            50% { background: #0a0a1a; filter: hue-rotate(90deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .glitch {
            color: #f00;
            text-shadow: 0 0 15px #f00;
            animation: glitch 0.7s infinite;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #0f0, -2px -2px #f00; }
            25% { text-shadow: -2px 2px #0f0, 2px -2px #f00; }
            50% { text-shadow: 5px -5px #f00, -5px 5px #0f0; }
            100% { text-shadow: -5px -5px #f00, 5px 5px #0f0; }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(#111, #000);
            border: 3px solid #0f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px #0f0;
            font-size: 1.3em;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            color: #0f0;
            font-size: 0.9em;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .stat-value {
            color: #0f0;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #111;
            border: 2px solid #0f0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 0 20px #0f0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #00ff00);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }

        .question-box {
            background: linear-gradient(135deg, #111, #000);
            border: 3px double #0f0;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 0 60px #0f0, inset 0 0 40px #001;
            min-height: 150px;
        }

        .question-text {
            font-size: 1.6em;
            margin-bottom: 30px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            line-height: 1.4;
        }

        .difficulty {
            display: inline-block;
            margin-bottom: 20px;
            padding: 5px 15px;
            border: 2px solid #0f0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .difficulty.easy { color: #0f0; }
        .difficulty.medium { color: #ff0; }
        .difficulty.hard { color: #f00; }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .option {
            padding: 20px;
            border: 3px solid #0f0;
            background: #000;
            color: #0f0;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .option:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px #0f0;
            transform: scale(1.05);
        }

        .option.correct {
            background: #0f0;
            color: #000;
            border-color: #0f0;
            box-shadow: 0 0 60px #0f0;
        }

        .option.incorrect {
            background: #f00;
            color: #fff;
            border-color: #f00;
            box-shadow: 0 0 40px #f00;
        }

        .option:disabled {
            cursor: not-allowed;
        }

        .button {
            padding: 15px 40px;
            font-size: 1.1em;
            background: #300;
            color: #0f0;
            border: 3px solid #0f0;
            cursor: pointer;
            margin: 15px;
            border-radius: 12px;
            box-shadow: 0 0 20px #0f0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .button:hover:not(:disabled) {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 50px #0f0;
            transform: scale(1.1);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            padding: 30px;
            border: 3px solid #0f0;
            border-radius: 15px;
            margin: 30px 0;
            font-size: 1.2em;
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box.correct {
            background: rgba(0, 255, 0, 0.1);
            border-color: #0f0;
            box-shadow: 0 0 40px #0f0;
        }

        .result-box.incorrect {
            background: rgba(255, 0, 0, 0.1);
            border-color: #f00;
            box-shadow: 0 0 40px #f00;
        }

        .result-message {
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .result-correct { color: #0f0; }
        .result-incorrect { color: #f00; }

        .result-explanation {
            text-align: left;
            background: #111;
            border-left: 4px solid #0f0;
            padding: 15px;
            margin-top: 15px;
            font-size: 0.95em;
            color: #0f0;
        }

        .final-screen {
            display: none;
            text-align: center;
        }

        .final-screen.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .final-score {
            font-size: 3em;
            color: #0f0;
            text-shadow: 0 0 30px #0f0;
            margin: 30px 0;
        }

        .score-bar {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border-radius: 50%;
            border: 5px solid #0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            box-shadow: 0 0 60px #0f0;
            background: conic-gradient(#0f0 var(--percentage), #111 0);
        }

        .category-select { display: none; }
        .category-select.show { display: block; }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .category-btn {
            padding: 30px;
            font-size: 1.2em;
            background: #000;
            color: #0f0;
            border: 3px solid #0f0;
            cursor: pointer;
            border-radius: 15px;
            box-shadow: 0 0 20px #0f0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 50px #0f0;
            transform: scale(1.05);
        }

        .controls { margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">⚡ CYBER QUIZ v1.0 ⚡</h1>
        <p style="margin-bottom: 30px; font-size: 1.1em;">Teste seu conhecimento em tecnologia e programação</p>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">QUESTÃO</span>
                <span class="stat-value" id="questionCount">0/0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ACERTOS</span>
                <span class="stat-value" id="correctCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">TAXA ACERTO</span>
                <span class="stat-value" id="percentCount">0%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">PONTOS</span>
                <span class="stat-value" id="scoreCount">0</span>
            </div>
        </div>

        <div class="category-select show" id="categorySelect">
            <h2 style="color: #0f0; margin: 30px 0; font-size: 1.8em;">ESCOLHA UMA CATEGORIA:</h2>
            <div class="categories-grid" id="categoriesGrid"></div>
        </div>

        <div id="quizArea" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-box">
                <div id="difficultyBadge" class="difficulty"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
            <div class="result-box" id="resultBox">
                <div class="result-message" id="resultMessage"></div>
                <div class="result-explanation" id="resultExplanation"></div>
            </div>
            <div class="controls">
                <button class="button" id="nextBtn" onclick="nextQuestion()" style="display: none;">PRÓXIMA QUESTÃO →</button>
            </div>
        </div>

        <div class="final-screen" id="finalScreen">
            <h2 style="color: #0f0; margin: 30px 0; font-size: 2em;">QUIZ CONCLUÍDO!</h2>
            <div class="score-bar" id="scoreCircle"></div>
            <div class="final-score" id="finalScore"></div>
            <button class="button" onclick="location.reload()">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="quiz-game.js"></script>
</body>
</html>
